name: Feature Request
description: Suggest an idea or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for NanoWiki? Describe it below.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is this related to a frustration or limitation you've hit?
      placeholder: I always have to ... and it's painful because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, links, or anything else that might help.
    validations:
      required: false
