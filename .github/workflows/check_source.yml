name: Check source code

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check_source_code:
    name: Check source code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Lint
        run: yarn lint

      - name: Check formatting
        run: yarn format:check
