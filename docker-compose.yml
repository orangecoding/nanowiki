services:
  nanowiki:
    container_name: nanowiki
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/orangecoding/nanowiki:latest
    restart: unless-stopped
    environment:
      - PORT=${PORT:-3000}
    ports:
      - '${PORT:-3000}:${PORT:-3000}'
    volumes:
      - ${NANOWIKI_DATA_DIR:-./data}:/data
    healthcheck:
      test: ['CMD-SHELL', "node -e \"require('http').get('http://localhost:' + (process.env.PORT || 3000) + '/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
